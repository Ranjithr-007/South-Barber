{% extends 'adminsection/base.html' %}
{% load static %}
{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --accent: #1f36e9;
    --accent-hover: #1f36e9;
    --body-bg: #f4f6fb;
    --card-bg: #ffffff;
    --text-primary: #1a202c;
    --text-muted: #718096;
    --border: #e2e8f0;
    --input-bg: #f7f8fc;
    --input-border: #dde1f0;
    --shadow: 0 4px 24px rgba(59,79,216,0.08);
  }

  .page-content {
    padding: 40px;
    background: var(--body-bg);
    min-height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
    align-items: center;        /* horizontal center */
    justify-content: flex-start;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 28px;
  }

  .login-card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 40px 36px;
    width: 400px;
    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent), #5b6ef5);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(59,79,216,0.3);
  }

  .login-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .login-card .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    pointer-events: none;
  }

  .form-control {
    width: 100%;
    padding: 11px 14px 11px 42px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 9px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  .form-control:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(59,79,216,0.12);
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(59,79,216,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-login:hover {
    background: var(--accent-hover);
    box-shadow: 0 6px 20px rgba(59,79,216,0.35);
    transform: translateY(-1px);
  }

  .login-divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }
</style>

<div class="page-content">
  <div style="width: 400px;"></div>
  <div class="section-title">Admin Login</div>

  <div class="login-card">
    <div class="login-icon">
      <!-- lock SVG icon -->
      <svg width="22" height="22" fill="none" stroke="#fff" viewBox="0 0 24 24">
        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your admin account to continue</p>

    <form method="POST" action="{% url 'signin' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label for="username" class="form-label">Admin name</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="text" name="username" id="username"
                 class="form-control" placeholder="Enter username">
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <input type="password" name="password" id="password"
                 class="form-control" placeholder="Enter password">
        </div>
      </div>

      <button type="submit" class="btn-login">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Login
      </button>
    </form>

    <div class="login-divider"></div>
    <div class="footer-note">South Barber Admin Portal · Secure Access</div>
  </div>
</div>

{% endblock %}
