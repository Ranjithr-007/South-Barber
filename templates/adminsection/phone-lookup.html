{% extends 'adminsection/base.html' %}
{% block content %}

<style>
  .lookup-wrapper {
    padding: 2rem;
    max-width: 520px;
    margin: 0 auto;
  }

  .lookup-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e4e8f7;
    box-shadow: 0 2px 20px rgba(31,54,233,0.08);
    overflow: hidden;
  }

  .lookup-card-top {
    background: linear-gradient(135deg, #1f36e9 0%, #4b5ef5 100%);
    padding: 1.2rem 1.6rem;
  }

  .lookup-card-top h4 {
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    margin: 0 0 3px;
  }

  .lookup-card-top p {
    color: rgba(255,255,255,0.75);
    font-size: 0.8rem;
    margin: 0;
  }

  .lookup-body {
    padding: 1.75rem;
  }

  .phone-input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .phone-input-wrap input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #dde2f8;
    border-radius: 10px;
    font-size: 1.1rem;
    font-family: monospace;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
    color: #1a1a2e;
  }

  .phone-input-wrap input:focus {
    border-color: #1f36e9;
  }

  .btn-clear {
    background: #f0f2fb;
    border: none;
    border-radius: 8px;
    padding: 11px 14px;
    cursor: pointer;
    color: #8890b5;
    font-size: 1rem;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: #e0e3f5; }

  /* Result box */
  #result-box {
    display: none;
    margin-top: 1.25rem;
    border-radius: 12px;
    padding: 1.1rem 1.3rem;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #result-box.returning {
    background: #e8f8f0;
    border: 1.5px solid #a3e4c1;
  }

  #result-box.new-customer {
    background: #fff8e8;
    border: 1.5px solid #f5e0a0;
  }

  #result-box.not-found {
    background: #f5f5fb;
    border: 1.5px solid #dde2f8;
  }

  .result-emoji {
    font-size: 1.6rem;
    margin-bottom: 6px;
  }

  .result-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a1a2e;
    margin: 0 0 4px;
  }

  .result-sub {
    font-size: 0.83rem;
    color: #6b6b8a;
    margin: 0 0 1rem;
  }

  .result-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-go {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 0.83rem;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn-go:hover { opacity: 0.85; text-decoration: none; }

  .btn-go.primary { background: #1f36e9; color: #fff; }
  .btn-go.secondary { background: #ede9fd; color: #4b35c4; }
  .btn-go.warning { background: #fff0f0; color: #d63031; border: 1px solid #ffd6d6; }

  .visit-badge {
    display: inline-block;
    background: #1a8a55;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .spinner {
    display: none;
    margin-top: 1rem;
    text-align: center;
    color: #8890b5;
    font-size: 0.85rem;
  }
</style>

<div class="lookup-wrapper">

  <div class="lookup-card">
    <div class="lookup-card-top">
      <h4>📱 Customer Phone Lookup</h4>
      <p>Enter phone number to check if the customer is new or returning</p>
    </div>

    <div class="lookup-body">
      <div class="phone-input-wrap">
        <input
          type="tel"
          id="phone-input"
          placeholder="Enter phone number..."
          maxlength="15"
          autofocus
        />
        <button class="btn-clear" onclick="clearInput()" title="Clear">✕</button>
      </div>

      <div class="spinner" id="spinner">🔍 Looking up...</div>

      <!-- Result appears here -->
      <div id="result-box"></div>
    </div>
  </div>

</div>

<script>
  let debounceTimer = null;

  document.getElementById('phone-input').addEventListener('input', function () {
    const phone = this.value.trim();
    const resultBox = document.getElementById('result-box');
    const spinner = document.getElementById('spinner');

    // Hide result if input is too short
    if (phone.length < 10) {
      resultBox.style.display = 'none';
      spinner.style.display = 'none';
      clearTimeout(debounceTimer);
      return;
    }

    // Debounce — wait 400ms after typing stops
    clearTimeout(debounceTimer);
    spinner.style.display = 'block';
    resultBox.style.display = 'none';

    debounceTimer = setTimeout(() => {
      fetch(`{% url 'check_customer_phone' %}?phone=${encodeURIComponent(phone)}`)
        .then(r => r.json())
        .then(data => {
          spinner.style.display = 'none';
          showResult(data, phone);
        })
        .catch(() => {
          spinner.style.display = 'none';
        });
    }, 400);
  });

  function showResult(data, phone) {
    const box = document.getElementById('result-box');
    box.className = '';  // reset classes
    box.style.display = 'block';

    if (data.found && data.is_returning) {
      // ── Returning customer ──
      box.classList.add('returning');
      box.innerHTML = `
        <div class="result-emoji">🎉</div>
        <p class="result-name">
          ${data.name}
          <span class="visit-badge">${data.visit_count} visit${data.visit_count > 1 ? 's' : ''}</span>
        </p>
        <p class="result-sub">Returning customer · ${phone}</p>
        <div class="result-actions">
          <a href="${data.detail_url}" class="btn-go primary">View Customer</a>
          <a href="${data.add_visit_url}" class="btn-go secondary">＋ Add Visit</a>
        </div>
      `;

    } else if (data.found && !data.is_returning) {
      // ── First-time customer (exists but 0 visits at this store) ──
      box.classList.add('new-customer');
      box.innerHTML = `
        <div class="result-emoji">👤</div>
        <p class="result-name">${data.name}</p>
        <p class="result-sub">First visit at this store · ${phone}</p>
        <div class="result-actions">
          <a href="${data.detail_url}" class="btn-go primary">View Customer</a>
          <a href="${data.add_visit_url}" class="btn-go secondary">＋ Add Visit</a>
        </div>
      `;

    } else {
      // ── Not found ──
      box.classList.add('not-found');
      box.innerHTML = `
        <div class="result-emoji">➕</div>
        <p class="result-name">New Customer</p>
        <p class="result-sub">No record found for ${phone}</p>
        <div class="result-actions">
          <a href="{% url 'addcustomer' %}" class="btn-go primary">Add Customer</a>
        </div>
      `;
    }
  }

  function clearInput() {
    document.getElementById('phone-input').value = '';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('phone-input').focus();
  }
</script>

{% endblock %}
