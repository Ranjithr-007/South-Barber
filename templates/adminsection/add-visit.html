{% extends 'adminsection/base.html' %}
{% load static %}
{% block content %}

<div id="page-wrapper">
    <div class="main-page">
        <div class="tables">
            <h3 class="title1">Add Visit</h3>
            <div class="table-container" style="max-width: 500px;">

                <h5>{{ customer.Name }} — {{ customer.PhoneNumber }}</h5>
                <small>Total Visits: {{ customer.total_visits }} | Retention: {{ customer.retention_rate }}%</small>
                <hr>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Bill Amount (₹)</label>
                        <input type="number" name="bill_amount" id="bill_amount"
                            class="form-control" step="0.01" required>
                    </div>

                    <div class="mb-3">
                        <label>Discount Type</label>
                        <select name="discount_type" id="discount_type" class="form-control">
                            <option value="PERCENT">Percentage (%)</option>
                            <option value="AMOUNT">Fixed Amount (₹)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Discount Value</label>
                        <input type="number" name="discount_value" id="discount_value"
                            class="form-control" step="0.01" value="0">
                    </div>

                    <!-- Live preview -->
                    <div class="alert alert-info">
                        <strong>Discount: ₹<span id="discount_amount">0.00</span></strong><br>
                        <strong>Final Amount: ₹<span id="final_amount">0.00</span></strong>
                    </div>

                    <div class="mb-3">
                        <label>Note</label>
                        <textarea name="note" class="form-control" rows="2"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">Save Visit</button>
                    <a href="{% url 'customer_detail' customer.PhoneID %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const bill = parseFloat(document.getElementById('bill_amount').value) || 0;
        const type = document.getElementById('discount_type').value;
        const value = parseFloat(document.getElementById('discount_value').value) || 0;

        let discount = 0;
        if (type === 'PERCENT') {
            discount = bill * value / 100;
        } else {
            discount = value;
        }

        const final = Math.max(bill - discount, 0);
        document.getElementById('discount_amount').textContent = discount.toFixed(2);
        document.getElementById('final_amount').textContent = final.toFixed(2);
    }

    document.getElementById('bill_amount').addEventListener('input', calculate);
    document.getElementById('discount_type').addEventListener('change', calculate);
    document.getElementById('discount_value').addEventListener('input', calculate);
</script>
{% endblock %}
